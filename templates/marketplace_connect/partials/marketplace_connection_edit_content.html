{% load djicons i18n %}
<div data-back-url="{% url 'marketplace_connect:marketplace_connections_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Marketplaceconnection" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'marketplace_connect:marketplace_connections_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-marketplace_connection-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-marketplace_connection-form"
          hx-post="{% url 'marketplace_connect:marketplace_connection_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Marketplace" %}</label>
                <input type="text" name="marketplace" class="input input-sm w-full" value="{{ obj.marketplace }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" value="{{ obj.name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Api Key" %}</label>
                <input type="text" name="api_key" class="input input-sm w-full" value="{{ obj.api_key }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Last Sync At" %}</label>
                <input type="datetime-local" name="last_sync_at" class="input input-sm w-full" value="{{ obj.last_sync_at }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Sync Enabled" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="sync_enabled" {% if obj.sync_enabled %}checked{% endif %}>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Config" %}</label>
                <textarea name="config" class="textarea textarea-sm w-full" rows="3">{{ obj.config }}</textarea>
                </div>
            </div>
        </div>
    </form>
</div>
